<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Specifies the character encoding for the document. -->
    <meta charset="UTF-8">
    <!-- Sets the viewport to ensure the site is responsive and scales correctly on all devices. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The title of the page, which appears in the browser tab and search engine results. -->
    <title>The Career Map - AI-Powered Career Roadmaps</title>
    <!-- Links to our favicon file located in the static directory. -->
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <!-- The script for Tailwind CSS, a utility-first CSS framework for rapid UI development. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- The stylesheet for Flowbite, a component library built on top of Tailwind CSS. -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <!-- The script for Mermaid.js, a library for rendering diagrams and charts from text-based code. -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <!-- Supabase Client-side Library for handling authentication in the browser. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Links to Google Fonts to use the 'Inter' font for a professional look. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- A block for our own custom CSS styles. -->
    <style>
        /* Sets the base background color, text color, and font for the entire page. */
        body {
            background-color: #0B1120;
            color: #E0E6F0;
            font-family: 'Inter', sans-serif;
        }
        /* Styles for the animated background element. */
        #background-animation {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(135deg, #0B1120 0%, #10182c 100%);
        }
        /* The "glassmorphism" effect for our main content cards. */
        .glass-card {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        /* Styles for the search suggestions dropdown. */
        .suggestions-container { position: relative; }
        #suggestions-box {
            position: absolute; width: 100%; background-color: #1F2937;
            border: 1px solid #374151; border-top: none;
            z-index: 10;
            max-height: 200px; overflow-y: auto;
        }
        /* Styles for individual items within the suggestions dropdown. */
        .suggestion-item {
            padding: 0.75rem 1rem; cursor: pointer; color: #D1D5DB;
            transition: background-color 0.2s;
            text-transform: capitalize;
        }
        /* A special style for the currently highlighted suggestion. */
        .suggestion-active {
            background-color: #374151;
        }
        /* Keyframe animation for the cycling facts text. */
        .fact-fade {
            animation: factFade 8s ease-in-out infinite;
            opacity: 0;
            position: absolute;
            width: 100%;
            text-align: center;
        }
        @keyframes factFade {
            0%, 100% { opacity: 0; transform: translateY(10px); }
            10%, 80% { opacity: 1; transform: translateY(0); }
            90%, 95% { opacity: 0; transform: translateY(-10px);}
        }
        /* Styles for the expandable content within the action plan cards. */
        .card-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.5s ease-in-out, margin-top 0.5s ease-in-out;
        }
        /* When a card has the 'open' class, this style reveals the content. */
        .card.open .card-content {
            max-height: 500px;
            margin-top: 1rem;
        }
        /* Styles for the chevron icon. */
        .chevron { transition: transform 0.3s ease-in-out; }
        /* When a card has the 'open' class, this rotates the chevron icon. */
        .card.open .chevron { transform: rotate(180deg); }
        /* A simple animation for new log entries */
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .log-entry { animation: popIn 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen">
    <div id="background-animation"></div>

    <main class="relative z-10 w-full max-w-7xl mx-auto p-4 md:p-8 transition-all duration-500" id="main-content">
        <!-- The hero section's HTML is unchanged. -->
        <section id="hero-section" class="min-h-screen flex flex-col items-center justify-center text-center">
            <h1 class="text-4xl md:text-6xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-400">
                The Career Map
            </h1>
            <p class="mt-4 text-lg md:text-xl text-gray-400 max-w-2xl">
                Your personal AI mentor for generating intelligent career roadmaps.
            </p>
            <form id="roadmap-form" class="w-full max-w-xl mt-10">
                <div class="flex-grow suggestions-container">
                    <input type="text" id="job-title-input" placeholder="Enter your dream job title..."
                        class="w-full px-5 py-4 bg-gray-900/70 border border-gray-700 rounded-full focus:outline-none focus:ring-4 focus:ring-purple-500/50 transition-all text-lg text-center"
                        autocomplete="off">
                    <div id="suggestions-box" class="mt-2 rounded-b-2xl shadow-lg"></div>
                </div>
                <button type="submit" class="hidden">Generate</button>
            </form>
        </section>
        
        <!-- This is the "Intelligent Loading Screen" with a logs viewer. -->
        <section id="intelligent-loading-section" class="hidden my-16 max-w-3xl mx-auto">
            <h2 class="text-3xl font-bold text-center mb-4">Crafting Your Roadmap for...</h2>
            <p class="text-center text-2xl font-semibold text-purple-400 mb-8" id="loading-job-title"></p>
            
            <div class="w-full bg-gray-700 rounded-full h-2.5 mb-4">
                <div id="progress-bar" class="bg-purple-600 h-2.5 rounded-full transition-all duration-500 ease-linear" style="width: 0%"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div id="facts-container" class="relative h-24 text-gray-400 italic text-center">
                    <!-- Interesting facts will be dynamically inserted here. -->
                </div>
                <div class="glass-card p-4 font-mono text-xs text-gray-300 h-48 overflow-y-auto">
                    <div id="logs-container"></div>
                </div>
            </div>
        </section>

        <section id="results-dashboard" class="hidden">
            <!-- This section's HTML is unchanged. -->
            <div class="text-center mb-12"><h2 class="text-3xl font-bold" id="roadmap-title"></h2></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-6"><h3 class="text-2xl font-bold mb-4">Visual Path</h3><div id="mermaid-graph" class="mermaid flex justify-center items-start min-h-[400px] max-h-[60vh] overflow-auto"></div></div>
                <div class="glass-card p-6"><h3 class="text-2xl font-bold mb-4">Your Action Plan</h3><div id="roadmap-details" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2"></div></div>
            </div>
            <div class="text-center mt-12"><button id="export-button" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full transition-colors text-lg">Export Your Plan</button></div>
        </section>
        
        <div id="error-message" class="text-red-400 text-center mt-8 font-semibold"></div>
    </main>
    
    <script>
        // --- Initialization and DOM Selections ---
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        const heroSection = document.getElementById('hero-section');
        const loadingSection = document.getElementById('intelligent-loading-section');
        const resultsDashboard = document.getElementById('results-dashboard');
        const form = document.getElementById('roadmap-form');
        const jobTitleInput = document.getElementById('job-title-input');
        const suggestionsBox = document.getElementById('suggestions-box');
        const mermaidContainer = document.getElementById('mermaid-graph');
        const detailsContainer = document.getElementById('roadmap-details');
        const errorContainer = document.getElementById('error-message');
        const exportButton = document.getElementById('export-button');
        const roadmapTitle = document.getElementById('roadmap-title');
        const loadingJobTitle = document.getElementById('loading-job-title');
        const logsContainer = document.getElementById('logs-container');
        const factsContainer = document.getElementById('facts-container');
        const progressBar = document.getElementById('progress-bar');
        
        // --- State Variables ---
        let activeSuggestionIndex = -1;
        let pollingInterval; // A variable to hold our polling interval.
        let factInterval; // A variable for the facts interval.
        document.body.style.overflow = 'hidden';

        // --- Search and Keyboard Navigation Logic (Unchanged) ---
        jobTitleInput.addEventListener('input', async () => {
            const query = jobTitleInput.value.trim();
            activeSuggestionIndex = -1; 
            if (query.length < 2) { suggestionsBox.innerHTML = ''; return; }
            const response = await fetch(`/api/search-suggestions?q=${encodeURIComponent(query)}`);
            const suggestions = await response.json();
            suggestionsBox.innerHTML = '';
            suggestions.forEach(suggestion => {
                const div = document.createElement('div');
                div.textContent = suggestion;
                div.classList.add('suggestion-item');
                div.onclick = () => { jobTitleInput.value = suggestion; suggestionsBox.innerHTML = ''; form.requestSubmit(); };
                suggestionsBox.appendChild(div);
            });
        });
        jobTitleInput.addEventListener('keydown', (e) => {
            const suggestions = suggestionsBox.querySelectorAll('.suggestion-item');
            if (suggestions.length === 0) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); activeSuggestionIndex = (activeSuggestionIndex + 1) % suggestions.length; updateActiveSuggestion(suggestions); } 
            else if (e.key === 'ArrowUp') { e.preventDefault(); activeSuggestionIndex = (activeSuggestionIndex - 1 + suggestions.length) % suggestions.length; updateActiveSuggestion(suggestions); }
            else if (e.key === 'Enter' && activeSuggestionIndex > -1) { e.preventDefault(); suggestions[activeSuggestionIndex].click(); }
            else if (e.key === 'Tab' && suggestions.length > 0) { e.preventDefault(); if (activeSuggestionIndex === -1) activeSuggestionIndex = 0; jobTitleInput.value = suggestions[activeSuggestionIndex].textContent; suggestionsBox.innerHTML = ''; }
        });
        function updateActiveSuggestion(suggestions) {
            suggestions.forEach((suggestion, index) => {
                suggestion.classList.toggle('suggestion-active', index === activeSuggestionIndex);
                if (index === activeSuggestionIndex) suggestion.scrollIntoView({ block: 'nearest' });
            });
        }
        document.addEventListener('click', (e) => { if (!jobTitleInput.contains(e.target)) suggestionsBox.innerHTML = ''; });

        // --- Helper functions for the Loading Screen ---
        function addLog(message, type = 'info') {
            const logEntry = document.createElement('p');
            logEntry.className = 'log-entry';
            let prefix = '[INFO]';
            let colorClass = 'text-gray-400';
            if (type === 'success') { prefix = '[SUCCESS]'; colorClass = 'text-green-400'; }
            logEntry.innerHTML = `<span class="${colorClass}">${prefix}</span> ${message}`;
            logsContainer.appendChild(logEntry);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function startIntelligentLoading(loadingContent, correctedTitle) {
            loadingJobTitle.textContent = correctedTitle;
            // Start cycling through interesting facts
            let factIndex = 0;
            clearInterval(factInterval); // Clear any old interval
            factsContainer.innerHTML = `<p class="fact-fade">${loadingContent.facts[factIndex]}</p>`;
            factInterval = setInterval(() => {
                factIndex = (factIndex + 1) % loadingContent.facts.length;
                const newFact = document.createElement('p');
                newFact.className = 'fact-fade';
                newFact.textContent = loadingContent.facts[factIndex];
                factsContainer.innerHTML = '';
                factsContainer.appendChild(newFact);
            }, 8000);
        }

        // --- Polling function to get status updates ---
        function pollStatus(taskId, correctedTitle) {
            clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${taskId}`);
                    if (!response.ok) return;
                    const data = await response.json();

                    if (data.status === 'running') { 
                        addLog(data.message); 
                        progressBar.style.width = `${data.progress || 10}%`;
                    } else if (data.status === 'complete') {
                        clearInterval(pollingInterval);
                        clearInterval(factInterval);
                        addLog("Roadmap generation complete!", 'success');
                        progressBar.style.width = '100%';
                        setTimeout(() => {
                            displayRoadmap(data.result.roadmap_data, data.result.corrected_title);
                            loadingSection.classList.add('hidden');
                        }, 1000);
                    } else if (data.status === 'error') {
                        clearInterval(pollingInterval);
                        clearInterval(factInterval);
                        displayError(data.message);
                        loadingSection.classList.add('hidden');
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                    clearInterval(pollingInterval);
                }
            }, 2500); // Check for status updates every 2.5 seconds.
        }
        
        // --- Form Submission Logic (Re-architected for polling) ---
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const jobTitle = jobTitleInput.value.trim();
            if (!jobTitle) return;

            heroSection.classList.add('hidden');
            resultsDashboard.classList.add('hidden');
            loadingSection.classList.remove('hidden');
            errorContainer.textContent = '';
            logsContainer.innerHTML = '';
            
            try {
                const initialResponse = await fetch('/api/create-roadmap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_title: jobTitle })
                });

                if (!initialResponse.ok) throw new Error((await initialResponse.json()).detail || 'Failed to start generation.');
                const initialData = await initialResponse.json();

                if (initialData.final_roadmap) {
                    displayRoadmap(initialData.final_roadmap, initialData.corrected_title);
                    loadingSection.classList.add('hidden');
                    return;
                }

                if (initialData.task_id) {
                    startIntelligentLoading(initialData.loading_content, initialData.corrected_title);
                    addLog("Request received. Starting generation process...");
                    pollStatus(initialData.task_id, initialData.corrected_title);
                }
            } catch (error) {
                displayError(error.message);
                loadingSection.classList.add('hidden');
            }
        });

        // --- Display and Helper Functions ---
        async function displayRoadmap(roadmapData, correctedTitle) {
            document.body.style.overflow = 'auto';
            resultsDashboard.classList.remove('hidden');
            roadmapTitle.textContent = `Your Custom Roadmap: ${correctedTitle}`;
            mermaidContainer.innerHTML = '';
            if (roadmapData && roadmapData.mermaid_graph) {
                const { svg } = await mermaid.render(`graph-${Date.now()}`, roadmapData.mermaid_graph);
                mermaidContainer.innerHTML = svg;
            }
            const progress = JSON.parse(localStorage.getItem(`progress_${correctedTitle.toLowerCase()}`) || '{}');
            detailsContainer.innerHTML = '';
            if (roadmapData && Array.isArray(roadmapData.roadmap)) {
                roadmapData.roadmap.forEach((step, index) => {
                    const isChecked = progress[index] ? 'checked' : '';
                    const skillsHtml = (Array.isArray(step.skills) ? step.skills : []).map(skill => `<span class="bg-gray-700/50 text-gray-300 px-3 py-1 rounded-full text-xs font-medium">${skill}</span>`).join('');
                    const freeCourseHtml = (step.free_course && step.free_course.url) ? `<a href="${step.free_course.url}" target="_blank" rel="noopener noreferrer" class="block text-green-400 hover:underline text-sm font-semibold"><strong>Free Option:</strong> ${step.free_course.name} &rarr;</a>` : '<p class="text-sm text-gray-500">No free course found.</p>';
                    let paidCourseHtml = '';
                    if (step.paid_course && step.paid_course.url) {
                        paidCourseHtml = `<a href="${step.paid_course.url}" target="_blank" rel="noopener noreferrer" class="block mt-3 text-yellow-400 hover:underline text-sm font-semibold"><strong>Premium Option:</strong> ${step.paid_course.name} &rarr;</a><p class="text-xs text-gray-400 mt-1 pl-2 border-l-2 border-yellow-400/50"><span class="font-bold">💡 Why consider this?</span> ${step.paid_course.reason || ''}</p>`;
                    }
                    const card = document.createElement('div');
                    card.id = `step-card-${index}`;
                    card.className = 'card p-4 border border-gray-700 rounded-lg transition-all duration-300 cursor-pointer';
                    card.innerHTML = `<div class="flex items-start justify-between card-header"><div class="flex-grow"><h4 class="text-lg font-bold text-purple-300">${step.title}</h4></div><div class="flex items-center"><input type="checkbox" data-step-index="${index}" class="form-checkbox h-5 w-5 bg-gray-800 border-gray-600 rounded text-green-500 focus:ring-green-500 ml-4 mt-1 z-10" ${isChecked}><svg class="chevron w-6 h-6 text-gray-400 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div></div><div class="card-content"><p class="mt-1 text-gray-400 text-sm">${step.description}</p><div class="mt-3 border-t border-gray-800 pt-3"><strong class="text-gray-500 text-sm">Skills to Master:</strong><div class="flex flex-wrap gap-2 mt-2">${skillsHtml}</div></div><div class="mt-4 border-t border-gray-800 pt-3"><strong class="text-gray-500 text-sm">Learning Resources:</strong><div class="mt-2">${freeCourseHtml}</div>${paidCourseHtml}<em class="text-xs text-gray-500 mt-2 block">(Note: We may earn a commission from premium links)</em></div></div>`;
                    detailsContainer.appendChild(card);
                });
            }
            setupInteractivity(correctedTitle);
            exportButton.onclick = () => exportToHtml(correctedTitle, roadmapData.roadmap);
        }
        function setupInteractivity(correctedTitle) {
             const progress = JSON.parse(localStorage.getItem(`progress_${correctedTitle.toLowerCase()}`) || '{}');
            detailsContainer.querySelectorAll('.card').forEach((card, index) => {
                const node = mermaidContainer.querySelector(`[id$="step${index}"]`);
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    checkbox.addEventListener('click', (e) => e.stopPropagation());
                    if (checkbox.checked && node) {
                        const rect = node.querySelector('rect, path');
                        if (rect) rect.style.fill = '#10B981';
                    }
                    checkbox.addEventListener('change', (e) => {
                        progress[index] = e.target.checked;
                        localStorage.setItem(`progress_${correctedTitle.toLowerCase()}`, JSON.stringify(progress));
                        if (node) {
                            const rect = node.querySelector('rect, path');
                            if (rect) rect.style.fill = e.target.checked ? '#10B981' : '#1F2937';
                        }
                    });
                }
                if (node) {
                    node.addEventListener('mouseover', () => card.style.borderColor = '#a855f7');
                    node.addEventListener('mouseout', () => card.style.borderColor = 'rgba(255, 255, 255, 0.1)');
                    card.addEventListener('mouseover', () => {
                        const rect = node.querySelector('rect, path');
                        if (rect) rect.style.stroke = '#a855f7';
                    });
                    card.addEventListener('mouseout', () => {
                        const rect = node.querySelector('rect, path');
                         if (rect) rect.style.stroke = '#9CA3AF';
                    });
                }
                card.addEventListener('click', () => card.classList.toggle('open'));
            });
        }
        function displayError(message) {
            document.body.style.overflow = 'hidden';
            resultsDashboard.classList.add('hidden');
            heroSection.classList.remove('hidden');
            errorContainer.textContent = `An error occurred: ${message}`;
        }
        function exportToHtml(correctedTitle, roadmapData) {
            if (!roadmapData || !Array.isArray(roadmapData.roadmap)) return;
            const detailsHtml = roadmapData.roadmap.map(step => {
                 const skillsHtml = (Array.isArray(step.skills) ? step.skills : []).map(skill => `<span class="skill">${skill}</span>`).join('');
                 const freeCourseLink = (step.free_course && step.free_course.url) ? `<a href="${step.free_course.url}" target="_blank">Free Course: ${step.free_course.name}</a>` : '';
                 const paidCourseLink = (step.paid_course && step.paid_course.url) ? `<br><a href="${step.paid_course.url}" target="_blank">Premium Course: ${step.paid_course.name}</a><p class="reason">${step.paid_course.reason || ''}</p>` : '';
                 return `<div class="card"><h3>${step.title}</h3><p>${step.description}</p><div class="skills-container"><strong>Skills:</strong> ${skillsHtml}</div><div class="course-links">${freeCourseLink}${paidCourseLink}</div></div>`;
            }).join('');
            const htmlContent = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Roadmap: ${correctedTitle}</title><style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; padding: 20px; }.container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }.card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; } h3 { color: #34495e; }a { color: #2980b9; text-decoration: none; font-weight: bold; } a:hover { text-decoration: underline; }.skill { background-color: #ecf0f1; color: #34495e; padding: 3px 8px; border-radius: 12px; font-size: 0.9em; margin-right: 5px; display: inline-block; margin-top: 5px; }.skills-container, .course-links { margin-top: 10px; }.reason { font-size: 0.9em; color: #555; font-style: italic; margin-top: 5px; }</style></head><body><div class="container"><h1>Your Career Roadmap: ${correctedTitle}</h1>${detailsHtml}</div></body></html>`;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `roadmap-${correctedTitle.toLowerCase().replace(/\s+/g, '-')}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
    
    <!-- Flowbite & Cuelinks scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>

      (function(d, t) {
        var s = document.createElement('script');

        document.getElementsByTagName('body')[0].appendChild(s);
      }());
    </script>
         
</body>
